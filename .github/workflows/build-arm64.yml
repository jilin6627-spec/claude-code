name: build-arm64

on:
 workflow_dispatch:
 inputs:
 claude_code_version:
 description: "Claude Code CLI version"
 required: true
 default: "latest"
 image_tag:
 description: "Image tag"
 required: true
 default: "latest"

permissions:
 contents: read
 packages: write

jobs:
 build:
 runs-on: ubuntu-22.04-arm

 steps:
 - name: Checkout
 uses: actions/checkout@v5

 - name: Set up Buildx
 uses: docker/setup-buildx-action@v3

 - name: Login to GHCR
 uses: docker/login-action@v3
 with:
 registry: ghcr.io
 username: ${{ github.actor }}
 password: ${{ secrets.GITHUB_TOKEN }}

 - name: Build and push arm64 image
 uses: docker/build-push-action@v6
 with:
 context: .
 file: ./Dockerfile
 push: true
 platforms: linux/arm64
 build-args: |
 CLAUDE_CODE_VERSION=${{ inputs.claude_code_version }}
 REPO_URL=https://github.com/${{ github.repository }}
 tags: |
 ghcr.io/${{ github.repository_owner }}/claude-agent:${{ inputs.image_tag }}

 - name: Export arm64 tar
 uses: docker/build-push-action@v6
 with:
 context: .
 file: ./Dockerfile
 push: false
 platforms: linux/arm64
 build-args: |
 CLAUDE_CODE_VERSION=${{ inputs.claude_code_version }}
 REPO_URL=https://github.com/${{ github.repository }}
 tags: claude-agent:${{ inputs.image_tag }}
 outputs: type=docker,dest=/tmp/claude-agent-linux-arm64.tar

 - name: Upload tar artifact
 uses: actions/upload-artifact@v4
 with:
 name: claude-agent-linux-arm64-tar
 path: /tmp/claude-agent-linux-arm64.tar
